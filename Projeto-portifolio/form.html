<form action="/enviar-dados" method="post">

<!-- Campo de texto simples -->
<label for="nome">Nome Completo:</label>
<input type="text" id="nome" name="nome"
placeholder="Digite seu nome" required>

<!-- Campo de email -->
<label for="email">Email:</label>
<input type="email" id="email" name="email" required>

<!-- Campo de senha -->
<label for="senha">Senha:</label>
<input type="password" id="senha" name="senha" minlength="8">

<!-- Campo de data -->
<label for="nascimento">Data de Nascimento:</label>
<input type="date" id="nascimento" name="nascimento">

<!-- Caixa de selecao (dropdown) -->
<label for="curso">Curso:</label>
<select id="curso" name="curso">
<option value="">Selecione um curso</option>
<option value="info">Tecnico em Informatica</option>
<option value="admin">Tecnico em Administracao</option>
</select>

<!-- Area de texto (multilinha) -->
<label for="mensagem">Mensagem:</label>
<textarea id="mensagem" name="mensagem" rows="3"

EETEPA - PADRE SALES | DESENVOLVIMENTO WEB FRONT-END

Prof. Esp. Luis Orlando P. Carvalho

Página 17 de 40

placeholder="Escreva sua mensagem..."></textarea>

<!-- Caixas de verificacao (checkbox) -->
<fieldset>
<legend>Interesses:</legend>
<input type="checkbox" id="html" name="interesse" value="html">
<label for="html">HTML5</label>
<input type="checkbox" id="css" name="interesse" value="css">
<label for="css">CSS3</label>
</fieldset>

<!-- Botao de envio -->
<button type="submit">Enviar Cadastro</button>
<button type="reset">Limpar Campos</button>
</form>
